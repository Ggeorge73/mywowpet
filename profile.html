<head>

  <link rel="stylesheet" href="css/variables.css">

  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="nav-slot"></div>

  <!-- Profile Header -->

          <div class="profile-meta">
            <span>ðŸ—“ Member since Jan 2024</span>

          </div>

      </div>
    </div>
  </div>

  <div class="page-body">
    <div class="container" style="padding-bottom: var(--space-16);">
      <!-- Tabs -->

        <div class="profile-tab" onclick="ProfilePage.switchTab('loyalty')">â­ Loyalty</div>

        <div class="profile-tab" onclick="ProfilePage.switchTab('wishlist')">â¤ï¸ Wishlist</div>
      </div>

      <!-- My Pets Section -->
      <div class="profile-section active" id="section-pets"></div>

      <!-- Loyalty Section -->

      <!-- Orders Section -->

      <!-- Subscriptions Section -->

    </div>
  </div>

  <!-- Add Pet Modal -->
  <div class="modal-overlay" id="pet-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="pet-modal-title">Add a Pet</h3>
        <button class="modal-close" onclick="ProfilePage.closeModal()">âœ•</button>
      </div>
      <div class="modal-body">
        <div class="input-group mb-4">
          <label for="pet-name">Pet Name</label>
          <input type="text" id="pet-name" placeholder="Buddy">
        </div>
        <div class="form-row two-col" style="margin-bottom: var(--space-4);">
          <div class="input-group">
            <label for="pet-species">Species</label>
            <select id="pet-species">
              <option value="dog">ðŸ• Dog</option>
              <option value="cat">ðŸˆ Cat</option>
              <option value="small-pet">ðŸ¹ Small Pet</option>
              <option value="bird">ðŸ¦œ Bird</option>
            </select>
          </div>
          <div class="input-group">
            <label for="pet-breed">Breed</label>
            <input type="text" id="pet-breed" placeholder="Golden Retriever">
          </div>
        </div>
        <div class="form-row two-col" style="margin-bottom: var(--space-4);">
          <div class="input-group">
            <label for="pet-birthday">Birthday</label>
            <input type="date" id="pet-birthday">
          </div>
          <div class="input-group">
            <label for="pet-emoji">Avatar Emoji</label>
            <select id="pet-emoji">
              <option value="ðŸ•">ðŸ• Dog</option>
              <option value="ðŸˆ">ðŸˆ Cat</option>
              <option value="ðŸ¹">ðŸ¹ Hamster</option>
              <option value="ðŸ°">ðŸ° Bunny</option>
              <option value="ðŸ¦œ">ðŸ¦œ Bird</option>
              <option value="ðŸ¶">ðŸ¶ Puppy Face</option>
              <option value="ðŸ˜¸">ðŸ˜¸ Cat Face</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label for="pet-notes">Dietary Notes</label>
          <textarea id="pet-notes" rows="2" placeholder="Allergies, preferences, etc." style="resize: vertical;"></textarea>
        </div>
        <input type="hidden" id="pet-edit-id" value="">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="ProfilePage.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="ProfilePage.savePet()">Save Pet</button>
      </div>
    </div>
  </div>
  <!-- ======== DAILY STREAK ======== -->
  <section class="section" id="streak-section" style="background: var(--color-bg-alt);">
    <div class="container" style="max-width: 480px;">
      <span class="section-label">Daily Habit</span>
      <h2 class="section-title" style="margin-bottom: var(--space-6);">🔥 Daily Paw Streak</h2>
      <div id="streak-widget-mount"></div>
    </div>
  </section>


  <div id="footer-slot"></div>

  <script src="js/store.js"></script>
    <script src="js/flash-sale.js"></script>
  <script src="js/social-proof.js"></script>
  <script src="js/streak.js"></script>
  <script src="js/spinwheel.js"></script>
  <script src="js/quickview.js"></script><script src="js/app.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/profile.js"></script>
  <script>
    WowApp.init('profile');
      setTimeout(() => { if (typeof WowStreak !== 'undefined') WowStreak.initWidget(); }, 200);
