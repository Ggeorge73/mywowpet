<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review your shopping cart at WowPetStore.">
  <title>Cart | WowPetStore</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="nav-slot"></div>

  <div class="page-body">
    <div class="container section" style="padding-top: var(--space-6);">
      <nav class="breadcrumbs">
        <a href="index.html">Home</a><span class="separator">›</span><span class="current">Cart</span>
      </nav>

      <h1 style="font-size: var(--fs-3xl); margin-bottom: var(--space-2);">Shopping Cart</h1>
      <p id="cart-count-text" class="text-muted mb-6"></p>

      <!-- Upsell -->
      <div class="cart-subscribe-upsell" id="subscribe-upsell" style="display: none;">
        <span class="upsell-icon">🔄</span>
        <div class="upsell-text">Switch to <strong>Subscribe & Save</strong> and get <strong>15% off</strong> these items — plus free shipping on every delivery!</div>
      </div>

      <div class="cart-layout" id="cart-layout" style="display: none;">
        <!-- Cart Items -->
        <div class="cart-items" id="cart-items"></div>

        <!-- Order Summary -->
        <div class="order-summary" id="order-summary"></div>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="empty-cart">
        <div class="empty-state-icon">🛒</div>
        <h3>Your Cart is Empty</h3>
        <p>Looks like you haven't added any products yet. Start shopping and treat your pet!</p>
        <a href="shop.html" class="btn btn-primary btn-lg">Start Shopping</a>
      </div>
    </div>
  </div>

  <div id="footer-slot"></div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/cart.js"></script>
  <script>
    WowApp.init('');
    CartPage.init();
  </script>
</body>
</html>
