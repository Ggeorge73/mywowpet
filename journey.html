<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore the My Wow Pet Solar Journey &#x2014; an immersive 3D experience to discover premium pet products.">
  <title>Solar Journey &#x1FA90; | My Wow Pet</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/journey.css">
  <link rel="stylesheet" href="css/pet-cursor.css">
</head>
<body class="journey-page">

  <!-- Loading Screen -->
  <div class="journey-loader" id="journey-loader">
    <div class="loader-logo">&#x1F43E; My Wow <span class="logo-accent">Pet</span></div>
    <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
    <div class="loader-text">Loading your solar journey...</div>
  </div>

  <!-- Three.js Canvas -->
  <canvas id="journey-canvas"></canvas>

  <!-- HUD: Top Bar -->
  <div class="journey-top" id="journey-top" style="display: none;">
    <a href="index.html" class="journey-back">&#x2190; Back to Store</a>
    <div class="journey-logo">&#x1F43E; My Wow <span class="logo-accent">Pet</span></div>
    <div class="journey-controls">
      <button class="journey-ctrl-btn" onclick="JourneyApp.resetCamera()" title="Reset View">&#x1F3E0;</button>
    </div>
  </div>

  <!-- Hover Label -->
  <div class="journey-label" id="journey-label">
    <div class="label-name" id="label-name"></div>
    <div class="label-count" id="label-count"></div>
  </div>

  <!-- Bottom Hint -->
  <div class="journey-hint" id="journey-hint" style="display: none;">
    Click a planet to explore products &#xB7; Drag to rotate &#xB7; Scroll to zoom
  </div>

  <!-- Product Info Panel -->
  <div class="journey-panel" id="journey-panel">
    <button class="journey-panel-close" onclick="JourneyApp.closePanel()">&#x2715;</button>
    <div class="journey-panel-category" id="panel-category"></div>
    <h2 id="panel-title"></h2>
    <p class="journey-panel-desc" id="panel-desc"></p>
    <div class="journey-panel-products" id="panel-products"></div>
    <div class="journey-nutrition" id="panel-nutrition">
      <h4>&#x1F9EC; Nutrition Insight</h4>
      <div id="nutrition-facts"></div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/animations.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/journey.js"></script>
  <script src="js/pet-cursor.js"></script>
</body>
</html>
